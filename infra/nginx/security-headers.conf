# manuelheller.dev — security headers (SF-2)
#
# Installed on the box as `/etc/nginx/snippets/security-headers.conf`, included
# per `location` block in `/etc/nginx/sites-available/manuelheller.dev`
# (`_next/static/`, the static-asset regex, and HTML `/`). The per-location
# pattern is load-bearing: nginx `add_header` inheritance breaks the moment a
# `location` declares its own `add_header`, so server-block-level headers
# would be silently dropped wherever a location already has caching headers.
# See `infra/nginx/DECISIONS.md` for per-directive reasoning + install steps.
#
# Static export (`output: "export"`) — every header must come from Nginx
# because Next.js `headers()` only runs on a Node runtime.
#
# `always` on every add_header so the headers attach to error responses
# too (404 / 410 / 502 / etc.). Without it Nginx silently drops them on
# non-2xx, leaving error pages without security headers.

# -----------------------------------------------------------------
# Content-Security-Policy — enforcing.
# Inline-script reasoning (`'unsafe-inline'` on script-src):
#  - src/app/page.tsx — REDIRECT_SCRIPT (locale detection, ~600 bytes).
#  - src/app/[locale]/layout.tsx — JSON-LD <script type="application/ld+json">.
# Both are build-time-controlled (no template substitution from user input).
# Phase 2 (per DECISIONS.md) replaces `'unsafe-inline'` with two `'sha256-...'`
# hashes once a build-time helper extracts them.
# style-src 'unsafe-inline' is required by Tailwind v4 + Next.js critical-CSS
# injection — removing it breaks the build.
# -----------------------------------------------------------------
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; media-src 'self'; worker-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self' mailto:; manifest-src 'self'; upgrade-insecure-requests" always;

# -----------------------------------------------------------------
# HSTS — 2 years, includeSubDomains, preload-eligible.
# Submit to https://hstspreload.org only AFTER confirming every
# subdomain (incl. future analytics + email/MX hostnames) is HTTPS-ready.
# -----------------------------------------------------------------
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# -----------------------------------------------------------------
# MIME sniffing + clickjacking + referrer
# X-Frame-Options DENY pairs with `frame-ancestors 'none'` above; redundant
# for modern browsers but kept as a legacy shim.
# -----------------------------------------------------------------
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# -----------------------------------------------------------------
# Permissions-Policy — deny every browser feature the site doesn't use.
# Both opt-out tokens for Google's behavioural-ad surface: `interest-cohort=()`
# covers the retired FLoC (still respected by older Chromium builds),
# `browsing-topics=()` is the active Topics API opt-out.
# -----------------------------------------------------------------
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# -----------------------------------------------------------------
# Cross-Origin isolation — same-origin browsing-context-group + same-origin
# resource policy. Pairs with the all-same-origin asset layout.
# COEP omitted: enabling it would require every cross-origin resource
# (none today, Plausible + Worker tomorrow) to send CORP, and the
# isolation gain isn't worth the future-coordination cost.
# -----------------------------------------------------------------
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
