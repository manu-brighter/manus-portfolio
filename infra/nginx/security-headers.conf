# manuelheller.dev — security headers (SF-2)
#
# Sourced by /etc/nginx/sites-available/manuelheller.dev via:
#     include /etc/nginx/conf.d/security-headers.conf;
#
# Static export (output: "export") — every header must come from Nginx
# because Next.js `headers()` only runs on a Node runtime. See
# `.rework/sf2-csp-decisions.md` in the repo for per-directive
# reasoning + the Phase 1 (Report-Only) → Phase 2 (enforce + hashes)
# roll-out plan.
#
# `always` on every add_header so the headers attach to error responses
# too (404 / 410 / 502 / etc.). Without it Nginx silently drops them on
# non-2xx, leaving error pages without security headers.

# -----------------------------------------------------------------
# Content-Security-Policy — PHASE 1: Report-Only.
# Browse the site for 1–2 weeks watching DevTools console for
# `Refused to ... because it violates the following Content Security
# Policy directive` warnings. Tighten the directives below to clear
# real violations, then rename the directive to `Content-Security-Policy`
# (drop the `-Report-Only` suffix) to enforce.
#
# Inline-script reasoning (`'unsafe-inline'`):
#  - src/app/page.tsx — REDIRECT_SCRIPT (locale detection, ~600 bytes).
#  - src/app/[locale]/layout.tsx — JSON-LD <script type="application/ld+json">.
# Both are build-time-controlled (no template substitution from user
# input). Phase 2 replaces `'unsafe-inline'` with two `'sha256-...'`
# entries once the report-only window is stable.
# -----------------------------------------------------------------
add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; media-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self' mailto:; manifest-src 'self'; upgrade-insecure-requests" always;

# -----------------------------------------------------------------
# HSTS — 2 years, includeSubDomains, preload-eligible.
# Submit to https://hstspreload.org only AFTER confirming every
# subdomain (incl. future analytics + email/MX hostnames) is HTTPS-ready.
# -----------------------------------------------------------------
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# -----------------------------------------------------------------
# MIME sniffing + clickjacking + referrer
# -----------------------------------------------------------------
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# -----------------------------------------------------------------
# Permissions-Policy — deny every browser feature the site doesn't use.
# `interest-cohort=()` opts out of Google FLoC / Topics.
# -----------------------------------------------------------------
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# -----------------------------------------------------------------
# Cross-Origin isolation — same-origin browsing-context-group + same-origin
# resource policy. Pairs with the all-same-origin asset layout.
# COEP omitted: enabling it would require every cross-origin resource
# (none today, Plausible + Worker tomorrow) to send CORP, and the
# isolation gain isn't worth the future-coordination cost.
# -----------------------------------------------------------------
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
