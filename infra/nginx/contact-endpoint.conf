# Contact-form endpoint — maps the form's same-origin POST target
# (`/api/contact`) to the self-hosted PHP mailer.
#
# Drop this `location` block inside the manuelheller.dev `server { }` block
# (e.g. via `include` from the site vhost). The static site keeps being
# served from the doc-root; only this one exact path goes to PHP-FPM.
#
# Adjust the three paths to your box:
#   - SCRIPT_FILENAME  -> where you placed contact.php
#   - CONTACT_CONFIG   -> where you placed config.php (ideally OUTSIDE doc-root)
#   - fastcgi_pass     -> your PHP-FPM socket or host:port
#
# Because the request is same-origin, the existing CSP `connect-src 'self'`
# already allows it — no security-headers.conf change needed.

location = /api/contact {
    # Only POST is meaningful; let PHP answer 405 for anything else.
    include fastcgi_params;

    fastcgi_param SCRIPT_FILENAME /var/www/manus-portfolio/contact/contact.php;
    fastcgi_param CONTACT_CONFIG  /var/www/manus-portfolio/contact/config.php;

    # Match your PHP-FPM install (socket shown; or 127.0.0.1:9000).
    fastcgi_pass unix:/run/php/php-fpm.sock;
}
