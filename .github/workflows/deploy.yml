name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH-trigger server deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up SSH agent with deploy key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      # Pin server host key from repo secret SERVER_HOST_KEY (captured once locally
      # via `ssh-keyscan -t ed25519 45.81.235.147`, see server-handoff doc).
      # Refresh the secret only on server reinstall / host-key rotation.
      - name: Pin server host key
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_HOST_KEY" >> ~/.ssh/known_hosts
        env:
          SERVER_HOST_KEY: ${{ secrets.SERVER_HOST_KEY }}

      # BatchMode=yes disables interactive prompts (no stalled CI on auth fallback);
      # StrictHostKeyChecking=yes refuses unknown hosts (relies on the pinned entry above).
      # Explicit server-side deploy command is owned by the operator-side script — see
      # server-handoff doc.
      - name: Trigger server-side deploy
        run: ssh -o BatchMode=yes -o StrictHostKeyChecking=yes deploy@45.81.235.147
